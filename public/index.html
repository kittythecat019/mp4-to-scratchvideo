<!DOCTYPE html>
<html>

<head>

    <title>
        Scratch Video Encoder
    </title>

</head>

<body>

    <h1>
        MP4 → Scratch Video
    </h1>

    <input
        type="file"
        id="video"
    >

    <button onclick="upload()">
        Encode
    </button>

    <br><br>

    <textarea

        id="output"

        style="
            width:100%;
            height:300px;
        "

    ></textarea>

    <script>

        async function upload() {

            const file =

            document
            .getElementById("video")
            .files[0];

            const formData =
            new FormData();

            formData.append(
                "video",
                file
            );

            const response =

            await fetch("/upload", {

                method: "POST",

                body: formData

            });

            const text =
            await response.text();

            document
            .getElementById("output")
            .value = text;

        }

    </script>

</body>
</html>
